<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protocolo Alpha — Dr. Rodrigo Eziliani</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C9A84C;--gold-light:#E8C97A;--gold-dim:#8A6A28;
  --dark:#080808;--dark2:#0E0E0E;--dark3:#141414;--dark4:#1A1A1A;--dark5:#242424;
  --white:#F5F0E8;--muted:#888880;--text:#D0CAB8
}
html{scroll-behavior:smooth}
body{background:var(--dark);color:var(--text);font-family:'Inter',sans-serif;font-weight:300;line-height:1.7;overflow-x:hidden}

/* HERO */
.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;padding:80px 24px 60px;overflow:hidden;text-align:center}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 70% 55% at 50% 0%,rgba(201,168,76,.13) 0%,transparent 68%),#090909}
.hero-lines{position:absolute;inset:0;background-image:linear-gradient(rgba(201,168,76,.055) 1px,transparent 1px),linear-gradient(90deg,rgba(201,168,76,.055) 1px,transparent 1px);background-size:60px 60px;-webkit-mask-image:radial-gradient(ellipse 80% 75% at 50% 0%,black 0%,transparent 68%);mask-image:radial-gradient(ellipse 80% 75% at 50% 0%,black 0%,transparent 68%)}
.hero-line{width:1px;height:56px;background:linear-gradient(to bottom,transparent,var(--gold),transparent);margin:0 auto 30px;animation:fadeIn 1s .3s both}
.kicker{font-size:10px;font-weight:600;letter-spacing:.4em;text-transform:uppercase;color:var(--gold);margin-bottom:22px;animation:fadeUp .8s .2s both;position:relative;z-index:1}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(68px,13vw,150px);line-height:.9;letter-spacing:.02em;color:var(--white);margin-bottom:6px;animation:fadeUp .8s .3s both;position:relative;z-index:1}
.hero-title span{color:var(--gold);display:block}
.hero-sub{font-family:'Cormorant Garamond',serif;font-size:clamp(17px,2.5vw,26px);font-style:italic;color:var(--muted);margin-bottom:44px;animation:fadeUp .8s .4s both;position:relative;z-index:1}
.hero-copy{max-width:540px;font-size:15px;color:var(--text);margin-bottom:52px;animation:fadeUp .8s .5s both;position:relative;z-index:1}

/* BUTTON */
.btn{display:inline-flex;align-items:center;gap:12px;background:linear-gradient(135deg,#C9A84C 0%,#E8C97A 50%,#C9A84C 100%);color:#000;font-family:'Inter',sans-serif;font-size:12px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;text-decoration:none;padding:20px 48px;cursor:pointer;transition:all .4s;position:relative;overflow:hidden;border:none}
.btn::before{content:'';position:absolute;inset:0;background:rgba(255,255,255,.15);opacity:0;transition:opacity .3s}
.btn:hover::before{opacity:1}
.btn:hover{transform:translateY(-2px);box-shadow:0 20px 60px rgba(201,168,76,.4)}
.btn svg{width:18px;height:18px;transition:transform .3s}
.btn:hover svg{transform:translateX(4px)}

/* COMMONS */
.lbl{display:flex;align-items:center;gap:14px;font-size:10px;font-weight:600;letter-spacing:.45em;text-transform:uppercase;color:var(--gold);margin-bottom:18px}
.lbl::before{content:'';width:36px;height:1px;background:var(--gold)}
.ttl{font-family:'Bebas Neue',sans-serif;font-size:clamp(40px,7vw,78px);line-height:1;color:var(--white);margin-bottom:22px}
.bdy{font-size:15px;color:var(--text);max-width:600px}
.sep{width:100%;height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,.5),transparent);max-width:1100px;margin:0 auto}

/* AUTHOR */
.author{padding:110px 24px;position:relative;overflow:hidden}
.author-bg{position:absolute;inset:0;background:linear-gradient(135deg,#141414 0%,#0E0E0E 100%)}
.author-in{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center;position:relative;z-index:1}
.author-vis{position:relative}
.author-frame{aspect-ratio:3/4;border:1px solid rgba(201,168,76,.22);overflow:hidden;position:relative}
.author-frame img{width:100%;height:100%;object-fit:cover;object-position:top center;display:block;filter:grayscale(10%) contrast(1.05)}
.author-frame::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,transparent 55%,rgba(8,8,8,.55) 100%);pointer-events:none}
.corner1{position:absolute;top:-18px;right:-18px;width:110px;height:110px;border:1px solid rgba(201,168,76,.28);pointer-events:none}
.corner2{position:absolute;bottom:-16px;left:-16px;width:72px;height:72px;border:1px solid rgba(201,168,76,.18);pointer-events:none}
.stats{display:flex;gap:2px;margin-top:2px}
.stat{text-align:center;flex:1;padding:18px 10px;background:rgba(201,168,76,.06)}
.stat-n{font-family:'Bebas Neue',sans-serif;font-size:38px;color:var(--gold);display:block;line-height:1}
.stat-l{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-top:4px;display:block}
.author-name{font-family:'Cormorant Garamond',serif;font-size:clamp(30px,4vw,50px);font-weight:700;color:var(--white);line-height:1.1;margin-bottom:6px}
.author-role{font-size:9px;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);margin-bottom:28px;display:block}
.bio{font-size:15px;color:var(--text);line-height:1.85;margin-bottom:16px}
.bio strong{color:var(--white);font-weight:500}
.badge{display:inline-flex;align-items:center;gap:10px;background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.25);padding:9px 18px;margin-bottom:24px}
.badge svg{color:var(--gold);width:14px;height:14px;flex-shrink:0}
.badge span{font-size:9px;letter-spacing:.28em;text-transform:uppercase;color:var(--gold)}
.tags{display:flex;flex-wrap:wrap;gap:7px;margin-top:22px}
.tag{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-dim);border:1px solid rgba(201,168,76,.18);padding:5px 12px}

/* PROBLEMS */
.problems{padding:110px 24px}
.problems-in{max-width:1100px;margin:0 auto}
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;margin-top:60px;background:rgba(201,168,76,.07)}
.pcard{background:var(--dark2);padding:44px 32px;position:relative;overflow:hidden;transition:background .3s}
.pcard:hover{background:var(--dark3)}
.pcard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:0;transition:opacity .3s}
.pcard:hover::before{opacity:1}
.pnum{font-family:'Bebas Neue',sans-serif;font-size:60px;color:rgba(201,168,76,.09);line-height:1;position:absolute;top:20px;right:24px}
.picon{width:36px;height:36px;margin-bottom:20px;color:var(--gold)}
.ptitle{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:700;color:var(--white);margin-bottom:10px;line-height:1.3}
.ptext{font-size:13px;color:var(--muted);line-height:1.7}

/* PROTOCOL */
.protocol{padding:110px 24px;background:va
